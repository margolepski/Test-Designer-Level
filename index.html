<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Какой ты дизайнер? Узнай свой уровень</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LZHL5WE84T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LZHL5WE84T');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #1c1c1e;
      --bg-card: #ffffff;
      --mint: #44E2B1;
      --mint-light: #e2f5ee;
      --mint-text: #5D8480;
      --mint-glow: rgba(68, 226, 177, 0.4);
      --text: #121413;
      --text-secondary: #5D8480;
      --border: rgba(0,0,0,0.08);
      --radius-card: 28px;
      --radius-btn: 16px;
      --radius-chip: 12px;
      --radius-option: 14px;
    }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 620px;
      padding: 3rem 3rem 2.5rem;
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    /* ── INTRO ── */
    .intro-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      animation: fadeUp 0.4s ease both;
    }

    .level-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .chip {
      font-size: 14px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: var(--radius-chip);
      background: var(--mint-light);
      color: var(--mint-text);
    }

    .intro-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }

    .intro-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }

    .btn-start {
      width: 200px;
      height: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: none;
      background: #44E2B1;
      color: #121413;
      font-family: 'Geist', sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 0 6px rgba(68,226,177,0.4), 0 0 28px rgba(68,226,177,0.4);
      transition: box-shadow 0.2s, transform 0.15s;
      margin-top: 52px;
      margin-bottom: 3rem;
    }

    .btn-start:hover {
      box-shadow: 0 0 0 10px var(--mint-glow), 0 0 40px var(--mint-glow);
      transform: translateY(-1px);
    }

    .btn-start:active { transform: scale(0.98); }

    .intro-meta {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-top: auto;
    }

    /* ── QUIZ ── */
    .quiz-screen {
      display: flex;
      flex-direction: column;
      flex: 1;
      animation: fadeUp 0.3s ease both;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--mint-light);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 3px;
      background: var(--mint);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .step-label {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .block-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 8px;
      background: var(--mint-light);
      color: var(--mint-text);
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: clamp(20px, 3.5vw, 24px);
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 1.75rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .option-btn {
      text-align: left;
      padding: 15px 18px;
      border-radius: var(--radius-option);
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .option-btn:hover {
      border-color: var(--mint);
      background: var(--mint-light);
    }

    .option-btn.selected {
      border-color: var(--mint);
      border-width: 2px;
      background: var(--mint-light);
    }

    .option-btn.selected::after {
      content: '✓';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mint-text);
      font-size: 15px;
      font-weight: 600;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 1rem;
    }

    .btn-back {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.15s;
    }

    .btn-back:hover { color: var(--text); }

    .btn-next {
      padding: 13px 32px;
      border-radius: var(--radius-btn);
      border: none;
      background: var(--mint);
      color: #111;
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-next.active {
      opacity: 1;
      pointer-events: all;
      box-shadow: 0 0 0 5px var(--mint-glow);
    }

    .btn-next.active:hover {
      box-shadow: 0 0 0 8px var(--mint-glow);
      transform: translateY(-1px);
    }

    .btn-next.active:active { transform: scale(0.98); }

    /* ── RESULT ── */
    .result-wrap {
      display: flex;
      flex-direction: column;
      flex: 1;
      animation: fadeUp 0.4s ease both;
    }

    .result-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .result-eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .result-level {
      font-size: clamp(56px, 12vw, 80px);
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .result-score {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .result-desc {
      font-size: 15px;
      color: #444;
      line-height: 1.75;
      background: var(--mint-light);
      border-radius: var(--radius-option);
      padding: 1.25rem 1.5rem;
      text-align: left;
    }

    .result-bars-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 2rem 0 1rem;
    }

    .result-bars {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 2rem;
    }

    .bar-row { display: flex; flex-direction: column; gap: 6px; }

    .bar-label {
      font-size: 14px;
      color: var(--text);
      display: flex;
      justify-content: space-between;
    }

    .bar-score { color: var(--text-secondary); font-size: 13px; }

    .bar-track {
      height: 5px;
      background: var(--mint-light);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 5px;
      border-radius: 99px;
      background: var(--mint);
      transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-actions { margin-top: auto; }

    .btn-restart {
      padding: 13px 28px;
      border-radius: var(--radius-btn);
      border: 2px solid var(--mint);
      background: none;
      color: var(--mint-text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-restart:hover { background: var(--mint-light); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      body { padding: 1rem 0.75rem 2rem; }
      .card { padding: 2rem 1.5rem 2rem; border-radius: 20px; }
      .btn-start { padding: 16px 40px; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- INTRO -->
  <div id="screen-intro" class="intro-wrap">
    <div class="level-chips">
      <span class="chip">Junior</span>
      <span class="chip">Middle</span>
      <span class="chip">Senior</span>
      <span class="chip">Lead</span>
    </div>
    <h1 class="intro-title">Какой ты дизайнер?</h1>
    <p class="intro-subtitle">Узнай свой уровень</p>
    <button class="btn-start" onclick="startQuiz()">Пройти опрос</button>
    <p class="intro-meta">
      16 вопросов · около 5 минут<br>
      Hard skills, процессы, коммуникация, стратегия
    </p>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" style="display:none;" class="quiz-screen">
    <div class="quiz-header">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="step-label" id="step-label">1 / 16</div>
    </div>
    <div class="block-tag" id="block-tag"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-list"></div>
    <div class="nav">
      <button class="btn-back" id="btn-back" onclick="goBack()">← Назад</button>
      <button class="btn-next" id="btn-next" onclick="goNext()">Далее →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" style="display:none;" class="result-wrap">
    <div class="result-header">
      <div class="result-eyebrow">Твой уровень</div>
      <div class="result-level" id="result-level"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>
    <div class="result-bars-title">Разбивка по блокам</div>
    <div class="result-bars" id="result-bars"></div>
    <div class="result-actions">
      <button class="btn-restart" onclick="restart()">← Пройти ещё раз</button>
    </div>
  </div>

</div>
<script>
  const EXPERIENCE_Q = {
    block: "Опыт",
    text: "Сколько лет ты в сфере дизайна?",
    options: [
      { text: "1–3 года", score: 2 },
      { text: "3–5 лет", score: 4 },
      { text: "5+ лет", score: 6 }
    ]
  };

  const QUESTIONS = [
    { block: "Hard skills", text: "Как ты работаешь с компонентами в Figma?", options: [
      { text: "Использую готовые, не разбираюсь в структуре", score: 1 },
      { text: "Понимаю структуру, могу настраивать variants", score: 2 },
      { text: "Строю компоненты с нуля, поддерживаю дизайн-систему", score: 3 },
      { text: "Проектирую дизайн-систему под разные платформы и продукты", score: 4 }
    ]},
    { block: "Hard skills", text: "Насколько твои макеты готовы к разработке?", options: [
      { text: "Передаю макеты, разработчики часто задают вопросы", score: 1 },
      { text: "Описываю поведение, но иногда пропускаю edge cases", score: 2 },
      { text: "Закрываю состояния, edge cases, анимации — вопросов почти нет", score: 3 },
      { text: "Устанавливаю стандарты handoff для команды", score: 4 }
    ]},
    { block: "Hard skills", text: "Как ты работаешь с прототипами?", options: [
      { text: "Делаю базовые кликабельные прототипы", score: 1 },
      { text: "Прототипирую пользовательские сценарии для тестирования", score: 2 },
      { text: "Создаю сложные интерактивные прототипы для валидации гипотез", score: 3 },
      { text: "Определяю, когда нужен прототип, а когда достаточно другого артефакта", score: 4 }
    ]},
    { block: "Hard skills", text: "Как ты работаешь с визуальным качеством?", options: [
      { text: "Следую готовым гайдлайнам", score: 1 },
      { text: "Замечаю отступления от стиля, могу аргументировать правки", score: 2 },
      { text: "Формирую визуальный стиль, слежу за консистентностью", score: 3 },
      { text: "Задаю визуальные стандарты на уровне продукта или компании", score: 4 }
    ]},
    { block: "Процесс и исследования", text: "Как ты работаешь с пользовательскими исследованиями?", options: [
      { text: "Читаю готовые инсайты, если их кто-то провёл", score: 1 },
      { text: "Участвую в интервью, помогаю формулировать вопросы", score: 2 },
      { text: "Самостоятельно планирую и провожу исследования", score: 3 },
      { text: "Выстраиваю исследовательский процесс в команде, приоритизирую методы", score: 4 }
    ]},
    { block: "Процесс и исследования", text: "Как ты принимаешь дизайн-решения?", options: [
      { text: "Основываюсь на референсах и интуиции", score: 1 },
      { text: "Опираюсь на паттерны и гайдлайны платформ", score: 2 },
      { text: "Обосновываю решения данными, исследованиями или метриками", score: 3 },
      { text: "Создаю фреймворки принятия решений для команды", score: 4 }
    ]},
    { block: "Процесс и исследования", text: "Как ты работаешь с продуктовыми метриками?", options: [
      { text: "Не работаю с метриками, это не моя зона", score: 1 },
      { text: "Знаю базовые метрики продукта, слежу за ними", score: 2 },
      { text: "Связываю дизайн-решения с метриками, измеряю влияние изменений", score: 3 },
      { text: "Предлагаю метрики для оценки дизайна, влияю на продуктовые OKR", score: 4 }
    ]},
    { block: "Процесс и исследования", text: "Как ты работаешь с гипотезами?", options: [
      { text: "Не формулирую гипотезы, делаю по ТЗ", score: 1 },
      { text: "Могу сформулировать гипотезу, если попросят", score: 2 },
      { text: "Самостоятельно формулирую и проверяю гипотезы", score: 3 },
      { text: "Выстраиваю процесс экспериментов в команде", score: 4 }
    ]},
    { block: "Коммуникация", text: "Как ты презентуешь дизайн-решения?", options: [
      { text: "Показываю макеты и отвечаю на вопросы", score: 1 },
      { text: "Объясняю логику решения, ссылаюсь на пользователя", score: 2 },
      { text: "Выстраиваю презентацию под аудиторию: команда vs стейкхолдеры", score: 3 },
      { text: "Формирую культуру обсуждения дизайна в команде", score: 4 }
    ]},
    { block: "Коммуникация", text: "Как ты работаешь с фидбэком?", options: [
      { text: "Принимаю фидбэк и правлю без обсуждения", score: 1 },
      { text: "Могу объяснить своё решение, но в конфликте уступаю", score: 2 },
      { text: "Отделяю вкусовщину от обоснованного фидбэка, аргументирую позицию", score: 3 },
      { text: "Учу команду давать и принимать фидбэк конструктивно", score: 4 }
    ]},
    { block: "Коммуникация", text: "Как ты взаимодействуешь с разработчиками?", options: [
      { text: "Передаю макеты и жду результата", score: 1 },
      { text: "Обсуждаю технические ограничения, адаптирую решения", score: 2 },
      { text: "Выстраиваю партнёрство: участвую в планировании, влияю на tech decisions", score: 3 },
      { text: "Формирую процессы дизайн-разработки на уровне команды", score: 4 }
    ]},
    { block: "Коммуникация", text: "Как ты работаешь со стейкхолдерами?", options: [
      { text: "Выполняю задачи, которые ставят сверху", score: 1 },
      { text: "Задаю уточняющие вопросы, понимаю бизнес-контекст", score: 2 },
      { text: "Сам выхожу к стейкхолдерам, защищаю решения через бизнес-ценность", score: 3 },
      { text: "Влияю на приоритеты и стратегию через диалог со стейкхолдерами", score: 4 }
    ]},
    { block: "Стратегия и лидерство", text: "Как ты влияешь на продукт за пределами своей задачи?", options: [
      { text: "Работаю в рамках поставленных задач", score: 1 },
      { text: "Иногда предлагаю идеи за пределами своего scope", score: 2 },
      { text: "Регулярно инициирую улучшения, замечаю системные проблемы", score: 3 },
      { text: "Формирую продуктовое видение совместно с PM и бизнесом", score: 4 }
    ]},
    { block: "Стратегия и лидерство", text: "Как ты работаешь с другими дизайнерами?", options: [
      { text: "Работаю самостоятельно, мало пересекаюсь с командой", score: 1 },
      { text: "Участвую в ревью, помогаю коллегам по запросу", score: 2 },
      { text: "Провожу ревью, менторю джунов, развиваю практики в команде", score: 3 },
      { text: "Отвечаю за рост дизайнеров, выстраиваю процессы онбординга и развития", score: 4 }
    ]},
    { block: "Стратегия и лидерство", text: "Как ты относишься к неопределённости в задачах?", options: [
      { text: "Жду чёткого ТЗ, неопределённость мешает работе", score: 1 },
      { text: "Могу работать с размытыми задачами, если есть поддержка", score: 2 },
      { text: "Самостоятельно структурирую неопределённость, формулирую задачу", score: 3 },
      { text: "Помогаю команде работать в условиях неопределённости, задаю фреймворк", score: 4 }
    ]}
  ];

  const ALL_QUESTIONS = [EXPERIENCE_Q, ...QUESTIONS];
  const TOTAL = ALL_QUESTIONS.length;
  const BLOCKS = ["Hard skills", "Процесс и исследования", "Коммуникация", "Стратегия и лидерство"];
  const BLOCK_Q_INDICES = {
    "Hard skills": [1,2,3,4],
    "Процесс и исследования": [5,6,7,8],
    "Коммуникация": [9,10,11,12],
    "Стратегия и лидерство": [13,14,15]
  };

  let current = 0;
  let answers = new Array(TOTAL).fill(null);

  function showScreen(id) {
    ['screen-intro','screen-quiz','screen-result'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  function startQuiz() {
    current = 0;
    showScreen('screen-quiz');
    renderQuestion();
  }

  function renderQuestion() {
    const q = ALL_QUESTIONS[current];
    const fill = Math.round((current / TOTAL) * 100);
    document.getElementById('progress-fill').style.width = fill + '%';
    document.getElementById('step-label').textContent = `${current + 1} / ${TOTAL}`;
    document.getElementById('block-tag').textContent = q.block;
    document.getElementById('question-text').textContent = q.text;

    const list = document.getElementById('options-list');
    list.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
      btn.textContent = opt.text;
      btn.onclick = () => selectOption(i);
      list.appendChild(btn);
    });

    const backBtn = document.getElementById('btn-back');
    backBtn.textContent = current === 0 ? '← На главную' : '← Назад';

    const nextBtn = document.getElementById('btn-next');
    nextBtn.textContent = current === TOTAL - 1 ? 'Узнать результат →' : 'Далее →';
    nextBtn.classList.toggle('active', answers[current] !== null);
  }

  function selectOption(i) {
    answers[current] = i;
    document.querySelectorAll('.option-btn').forEach((btn, idx) => {
      btn.classList.toggle('selected', idx === i);
    });
    document.getElementById('btn-next').classList.add('active');
  }

  function goNext() {
    if (answers[current] === null) return;
    if (current < TOTAL - 1) {
      current++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResult();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function goBack() {
    if (current === 0) {
      showScreen('screen-intro');
    } else {
      current--;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function getBlockScore(blockName) {
    const indices = BLOCK_Q_INDICES[blockName];
    let total = 0, max = 0;
    indices.forEach(i => {
      if (answers[i] !== null) total += ALL_QUESTIONS[i].options[answers[i]].score;
      max += 4;
    });
    return { score: total, max };
  }

  function showResult() {
    showScreen('screen-result');
    const expBonus = EXPERIENCE_Q.options[answers[0]].score;
    let questionScore = 0;
    for (let i = 1; i < TOTAL; i++) {
      questionScore += ALL_QUESTIONS[i].options[answers[i]].score;
    }
    const total = questionScore + expBonus;

    let level, desc;
    if (total <= 30) {
      level = "Junior";
      desc = "Ты в начале пути — осваиваешь инструменты и учишься работать в команде. Сейчас главное: набирать насмотренность, задавать вопросы и не бояться ошибаться. Рост будет быстрым, если ты уже умеешь слышать фидбэк.";
    } else if (total <= 44) {
      level = "Middle";
      desc = "Ты уверенно работаешь самостоятельно, понимаешь продуктовый контекст и умеешь защищать решения. Следующий шаг — брать больше ответственности за процессы и начинать влиять на команду вокруг.";
    } else if (total <= 56) {
      level = "Senior";
      desc = "Ты мыслишь системно: видишь продукт целиком, работаешь со стейкхолдерами и помогаешь другим расти. Твоя ценность — не только в дизайне, но и в том, как ты формируешь среду вокруг себя.";
    } else {
      level = "Lead";
      desc = "Ты задаёшь стандарты — в дизайне, в процессах, в культуре команды. Влияешь на продуктовую стратегию, растишь людей и берёшь ответственность за результат далеко за пределами своих задач.";
    }

    document.getElementById('result-level').textContent = level;
    document.getElementById('result-score').textContent = `${total} баллов из 66`;
    document.getElementById('result-desc').textContent = desc;

    const barsWrap = document.getElementById('result-bars');
    barsWrap.innerHTML = '';
    BLOCKS.forEach(blockName => {
      const { score, max } = getBlockScore(blockName);
      const pct = Math.round((score / max) * 100);
      barsWrap.innerHTML += `
        <div class="bar-row">
          <div class="bar-label">
            <span>${blockName}</span>
            <span class="bar-score">${score} / ${max}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:0%" data-pct="${pct}"></div>
          </div>
        </div>`;
    });

    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);
  }

  function restart() {
    answers = new Array(TOTAL).fill(null);
    current = 0;
    showScreen('screen-intro');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
